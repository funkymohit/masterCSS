<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#product">Products</a></li>
                <li><a href="#gallery">Gallery</a></li>
                <li><a href="#contact">Contact</a></li>
                <li><a href="#ShippingInformation">Shipping Information</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="bio" id="product">
            <h1>Products </h1> <div id="products">
            <img src="images/product1.jpg" alt="image" width="180" height="120">
            <img src="images/product2.jpg" alt="image" width="180" height="120">
            <img src="images/product3.jpg" alt="image" width="180" height="120">
            <img src="images/product4.jpg" alt="image" width="180" height="120">
            <img src="images/product5.jpg" alt="image" width="180" height="120">
            </div>
        </section>
        <section id="gallery" class="gallery">
            <h2>Gallery</h2>
            <div class="images">
                <img src="images/photo1.jpg" alt="image">
                <img src="images/photo2.jpg" alt="image">
                <img src="images/photo3.jpg" alt="image">
                <img src="images/photo4.jpg" alt="image">
                <img src="images/photo5.jpg" alt="image">
            </div>
        </section>
        <section id="contact" class="contact">
            <h1>Contact</h1>
            <form action="POST">
                <label for="">Name</label>
                <input type="text">
                <label for="">Email</label>
                <input type="email">
                <label for="">Query</label>
                <input type="Query">
            </form>
        </section>
        <section id="ShippingInformation" class="shipping">
            <h2>Shipping Information</h2>
            <p>We offer standard shipping on all orders. Items are dispatched within 1-2 business days.</p>
            <ul>
                <li><strong>Standard:</strong> 3-5 business days</li>
                <li><strong>Express:</strong> 1-2 business days</li>
            </ul>
        </section>
        <section class="footer">
            <footer>
                Copyright ©️ 2026
            </footer>
        </section>
    </main>
</body>
</html>
