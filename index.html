<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>Home</li>
                <li>Contact</li>
                <li>About</li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="bio">
            <h1>Products</h1>
        </section>
        <section class="gallery">
            <h2>Gallery</h2>
            <div class="images">
                <img src="img/img1.jpg" alt="image">
                <img src="img/img2.jpg" alt="image">
                <img src="img/img3.jpg" alt="image">
                <img src="img/img4.png" alt="image">
                <img src="img/img5.jpg" alt="image">
            </div>
        </section>
        <section id="contact">
            <h1>Contact</h1>
            <form action="POST">
                <label for="">Name</label>
                <input type="text">
                <label for="">Email</label>
                <input type="email">
                <label for="">Query</label>
                <input type="Query">
            </form>
        </section>
        <section class="shipping">
            <h2>Shipping Information</h2>
            <p>We offer standard shipping on all orders. Items are dispatched within 1-2 business days.</p>
            <ul>
                <li><strong>Standard:</strong> 3-5 business days</li>
                <li><strong>Express:</strong> 1-2 business days</li>
            </ul>
        </section>
        <section class="footer">
            <footer>
                Copyright ©️ 2026
            </footer>
        </section>
    </main>
</body>
</html>
